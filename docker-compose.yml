services:
  db:
    image: postgres:16-alpine
    container_name: rl_logistica_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rl_logistica_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./logistica-palets-backend
      dockerfile: Dockerfile
    container_name: rl_logistica_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      NODE_ENV: production
      # TypeORM: producción NUNCA con synchronize. migrationsRun=true aplica
      # migrations pendientes al arrancar el contenedor.
      DB_SYNCHRONIZE: "${DB_SYNCHRONIZE:-false}"
      DB_MIGRATIONS_RUN: "${DB_MIGRATIONS_RUN:-true}"
      DB_LOGGING: "${DB_LOGGING:-false}"
      ALLOW_SEED: "${ALLOW_SEED:-false}"
      # Redis cache + WebSocket event bus
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Datos del emisor (RL Logística) para facturación electrónica
      EMISOR_RUC: ${EMISOR_RUC:-80000000}
      EMISOR_DV: ${EMISOR_DV:-0}
      EMISOR_RAZON_SOCIAL: ${EMISOR_RAZON_SOCIAL:-RL SERVICIO LOGISTICO SRL}
      EMISOR_NOMBRE_FANTASIA: ${EMISOR_NOMBRE_FANTASIA:-RL Logística}
      EMISOR_DIRECCION: ${EMISOR_DIRECCION:-Asunción, Paraguay}
      EMISOR_RESPONSABLE: ${EMISOR_RESPONSABLE:-Gerente General}
      # Timbrado asignado por la DNIT
      FACTURA_TIMBRADO: ${FACTURA_TIMBRADO:-12345678}
      FACTURA_VIGENCIA: ${FACTURA_VIGENCIA:-2026-12-31}
      FACTURA_ESTABLECIMIENTO: ${FACTURA_ESTABLECIMIENTO:-001}
      FACTURA_PUNTO_EXPEDICION: ${FACTURA_PUNTO_EXPEDICION:-001}
      # SIFEN endpoints (dejar vacío para modo simulación)
      SIFEN_URL: ${SIFEN_URL:-}
      SIFEN_URL_CONSULTA: ${SIFEN_URL_CONSULTA:-}
    ports:
      - "3000:3000"
    volumes:
      - ./CONTROL DE STOCK RL LOG Actualizado.xlsx:/app/CONTROL DE STOCK RL LOG Actualizado.xlsx:ro

  frontend:
    build:
      context: ./logistica-palets-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: rl_logistica_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5175:80"

volumes:
  postgres_data:
  # Redis uses ephemeral storage (cache is rebuild-safe; no persistence volume needed)