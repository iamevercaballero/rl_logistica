server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # No revelar la versión de nginx en headers/errores.
  server_tokens off;

  # --- Compresión gzip ------------------------------------------------------
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/xml
    application/json application/javascript application/xml+rss
    application/atom+xml image/svg+xml font/ttf font/otf;

  # --- Security headers -----------------------------------------------------
  # Nota: HSTS y SSL los gestiona el reverse proxy (Nginx/Traefik) del host,
  # no este contenedor (sirve HTTP internamente).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # CSP: descomentar y ajustar 'connect-src' al dominio real de la API una vez
  # conocido. Las fuentes de Google y los estilos inline de React requieren
  # 'unsafe-inline' en style-src y los dominios de fonts.
  # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.tudominio.com" always;

  # --- Assets hasheados: cache agresivo (1 año, inmutable) ------------------
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # --- index.html: nunca cachear (para que los deploys se reflejen) ---------
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }

  # --- SPA fallback ---------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }
}
